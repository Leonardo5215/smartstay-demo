<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SmartStay — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#05080f; --surface:#080d18; --card:#0c1422; --border:#0f1930;
  --cyan:#00d4c8; --green:#22c55e; --amber:#f59e0b; --orange:#f97316;
  --blue:#3b82f6; --red:#ef4444; --violet:#8b5cf6;
  --text:#e8edf5; --muted:#4a5568; --subtle:#0f1a30;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(0,212,200,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,200,.025) 1px,transparent 1px);
  background-size:52px 52px;pointer-events:none;}
.z1{position:relative;z-index:1;}

/* ── Header ── */
header{
  background:rgba(8,13,24,.97);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);padding:0 28px;height:66px;
  display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:200;
}
.logo{display:flex;align-items:center;gap:12px;}
.logo-icon{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,#0ea5e9,#00d4c8);
  display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 18px rgba(0,212,200,.25);}
.logo-name{font-family:'Bebas Neue';font-size:24px;letter-spacing:3px;color:#fff;line-height:1;}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:2px;font-family:monospace;}
.hstats{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap;}
.spill{display:flex;align-items:center;gap:6px;padding:5px 13px;border-radius:22px;
  background:var(--subtle);border:1px solid var(--border);}
.spill .sv{font-weight:700;font-size:14px;}
.spill .sl{font-size:10px;color:var(--muted);letter-spacing:.5px;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;box-shadow:0 0 6px var(--green);}
.conn-badge{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);font-family:monospace;}
.cdot{width:6px;height:6px;border-radius:50%;background:var(--red);transition:background .3s;}
.cdot.on{background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

/* ── Tabs ── */
.tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;gap:2px;}
.tab{padding:12px 20px;border:none;background:transparent;color:var(--muted);
  font-family:'DM Sans';font-size:13px;font-weight:500;cursor:pointer;
  border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.3px;}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan);}

/* ── Layout ── */
.main{display:flex;height:calc(100vh - 66px - 45px);}
.content{flex:1;overflow-y:auto;padding:24px 28px;}
.sidebar{width:300px;border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;}

/* ── Energy Banner ── */
.energy-banner{
  background:linear-gradient(135deg,#0a0f1c 0%,#0f1a30 100%);
  border:1px solid rgba(245,158,11,.25);border-radius:16px;
  padding:20px 24px;margin-bottom:22px;
  display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:16px;align-items:center;
}
.energy-banner::before{content:'⚡';position:absolute;right:24px;top:50%;transform:translateY(-50%);
  font-size:80px;opacity:.04;pointer-events:none;}
.energy-main{position:relative;}
.energy-label{font-size:10px;color:var(--amber);font-family:monospace;letter-spacing:2px;margin-bottom:4px;}
.energy-big{font-family:'Bebas Neue';font-size:38px;color:#fbbf24;line-height:1;letter-spacing:1px;}
.energy-sub{font-size:11px;color:var(--muted);font-family:monospace;margin-top:3px;}
.energy-stat{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);
  border-radius:10px;padding:12px 14px;text-align:center;}
.energy-stat-val{font-family:'Bebas Neue';font-size:24px;line-height:1;}
.energy-stat-lbl{font-size:10px;color:var(--muted);font-family:monospace;margin-top:2px;}
.energy-rate{display:flex;flex-direction:column;justify-content:center;align-items:flex-end;gap:4px;}
.rate-badge{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);
  border-radius:8px;padding:6px 12px;font-family:monospace;font-size:11px;color:var(--amber);white-space:nowrap;}

/* ── Occupancy bar ── */
.occ-bar-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:14px;}
.occ-bar{flex:1;height:8px;background:var(--subtle);border-radius:4px;overflow:hidden;display:flex;}
.occ-seg{height:100%;transition:width .6s cubic-bezier(.34,1.56,.64,1);}

/* ── Block cards ── */
.blocks-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:0;}
.block-card{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:20px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;
}
.block-card:hover{border-color:rgba(0,212,200,.3);box-shadow:0 0 24px rgba(0,212,200,.06);transform:translateY(-1px);}
.block-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--bc,var(--border));transition:background .3s;}
.block-a::before{--bc:var(--cyan);}
.block-b::before{--bc:var(--violet);}
.block-c::before{--bc:var(--amber);}
.block-d::before{--bc:var(--green);}
.block-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.block-letter{font-family:'Bebas Neue';font-size:52px;color:var(--bc,var(--cyan));line-height:1;letter-spacing:2px;}
.block-name{font-size:12px;color:var(--muted);font-family:monospace;letter-spacing:1px;margin-top:4px;}
.block-occ-num{font-family:'Bebas Neue';font-size:28px;color:#fff;text-align:right;line-height:1;}
.block-occ-lbl{font-size:10px;color:var(--muted);font-family:monospace;text-align:right;}
.block-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.bm{background:var(--subtle);border-radius:8px;padding:8px;text-align:center;}
.bm-val{font-size:15px;font-weight:700;line-height:1;}
.bm-lbl{font-size:9px;color:var(--muted);font-family:monospace;margin-top:2px;letter-spacing:.5px;}
.block-bar{height:6px;background:var(--subtle);border-radius:3px;overflow:hidden;display:flex;}
.block-bar-fill{height:100%;border-radius:3px;transition:width .5s ease;}
.block-mini-rooms{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px;}
.mini-room{
  width:28px;height:28px;border-radius:6px;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:9px;
  font-family:monospace;font-weight:700;transition:all .2s;
}
.mr-occupied   {background:rgba(0,212,200,.12);  color:var(--cyan);  border-color:rgba(0,212,200,.25);}
.mr-empty      {background:var(--subtle);         color:var(--muted); }
.mr-cleaning   {background:rgba(34,197,94,.12);   color:var(--green); border-color:rgba(34,197,94,.25);}
.mr-maintenance{background:rgba(249,115,22,.12);  color:var(--orange);border-color:rgba(249,115,22,.25);}
.block-expand-hint{font-size:10px;color:var(--muted);font-family:monospace;margin-top:8px;text-align:center;opacity:.6;}

/* ── Room detail (drill-down) ── */
.back-btn{display:flex;align-items:center;gap:8px;background:none;border:none;
  color:var(--cyan);cursor:pointer;font-family:'DM Sans';font-size:13px;
  padding:0;margin-bottom:18px;font-weight:500;}
.block-detail-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;}
.bdk-letter{font-family:'Bebas Neue';font-size:44px;line-height:1;}
.bdk-name{font-size:14px;color:var(--muted);font-family:monospace;letter-spacing:1px;}
.rooms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;}
.room-card{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:16px;position:relative;overflow:hidden;transition:border-color .3s,box-shadow .3s;}
.room-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--rc,var(--border));}
.rc-occupied   {--rc:var(--cyan);  border-color:rgba(0,212,200,.2);}
.rc-empty      {--rc:var(--muted);}
.rc-cleaning   {--rc:var(--green); border-color:rgba(34,197,94,.2); box-shadow:0 0 16px rgba(34,197,94,.06);}
.rc-maintenance{--rc:var(--orange);border-color:rgba(249,115,22,.2);box-shadow:0 0 16px rgba(249,115,22,.06);}
.rc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.rc-num{font-family:'Bebas Neue';font-size:28px;color:#fff;line-height:1;}
.rc-floor{font-size:9px;color:var(--muted);font-family:monospace;}
.rc-badge{padding:2px 9px;border-radius:18px;font-size:9px;font-family:monospace;border:1px solid;}
.rb-occupied   {background:rgba(0,212,200,.08); color:var(--cyan);  border-color:rgba(0,212,200,.25);}
.rb-empty      {background:rgba(74,85,104,.08); color:var(--muted); border-color:rgba(74,85,104,.2);}
.rb-cleaning   {background:rgba(34,197,94,.08); color:var(--green); border-color:rgba(34,197,94,.25);}
.rb-maintenance{background:rgba(249,115,22,.08);color:var(--orange);border-color:rgba(249,115,22,.25);}
.rc-guest{background:var(--subtle);border-radius:9px;padding:9px 11px;margin-bottom:9px;}
.rc-guest-name{font-size:12px;font-weight:600;}
.rc-guest-ph{font-size:10px;color:var(--muted);font-family:monospace;}
.rc-systems{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px;}
.sys-b{background:var(--subtle);border-radius:8px;padding:7px 9px;}
.sys-lbl{font-size:8px;color:var(--muted);font-family:monospace;letter-spacing:1px;margin-bottom:2px;}
.sys-val{font-size:12px;font-weight:700;}
.sys-on  {color:var(--cyan);}
.sys-idle{color:var(--amber);}
.sys-off {color:var(--muted);}
.staff-badge{border-radius:8px;padding:7px 10px;margin-bottom:7px;}
.staff-badge.cleaning   {background:rgba(34,197,94,.08); border:1px solid rgba(34,197,94,.2);}
.staff-badge.maintenance{background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.2);}
.staff-badge-role{font-size:9px;font-family:monospace;letter-spacing:1px;font-weight:700;}
.staff-badge.cleaning    .staff-badge-role{color:var(--green);}
.staff-badge.maintenance .staff-badge-role{color:var(--orange);}
.staff-badge-name{font-size:11px;font-weight:600;margin-top:1px;}

/* ── BI ── */
.bi-wrap{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;}
.bi-title{font-family:'Bebas Neue';font-size:26px;letter-spacing:2px;margin-bottom:2px;}
.bi-sub{font-size:11px;color:var(--muted);font-family:monospace;margin-bottom:18px;}
.bi-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.bi-filter{padding:5px 14px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;
  font-size:11px;font-family:monospace;letter-spacing:.5px;text-transform:uppercase;transition:all .15s;}
.bi-filter.active{background:#1e3a5f;border-color:var(--blue);color:var(--blue);}
.bi-filter-group{display:flex;gap:6px;flex-wrap:wrap;}
.bi-filter-label{font-size:10px;color:var(--muted);font-family:monospace;align-self:center;letter-spacing:1px;}
.bi-select{background:var(--subtle);border:1px solid var(--border);color:var(--text);
  border-radius:8px;padding:5px 10px;font-size:11px;font-family:monospace;cursor:pointer;outline:none;}
.bi-select option{background:var(--surface);}
.export-btns{display:flex;gap:6px;margin-left:auto;}
.exp-btn{padding:6px 14px;border-radius:20px;border:1px solid;font-size:11px;
  font-family:monospace;cursor:pointer;background:transparent;transition:all .15s;}
.exp-csv {border-color:var(--green); color:var(--green);}
.exp-xls {border-color:var(--cyan);  color:var(--cyan);}
.exp-pdf {border-color:var(--red);   color:var(--red);}
.exp-btn:hover{opacity:.75;}
.bi-table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-family:monospace;font-size:11px;}
th{padding:8px 10px;color:var(--muted);text-align:left;font-weight:600;border-bottom:1px solid var(--border);font-size:10px;letter-spacing:.5px;}
td{padding:9px 10px;border-bottom:1px solid rgba(15,25,48,.8);}
tr:hover td{background:rgba(255,255,255,.01);}
.type-badge{padding:2px 9px;border-radius:18px;font-size:10px;border:1px solid;}
.type-c{background:#052e16;color:#4ade80;border-color:#166534;}
.type-m{background:#1c1917;color:#fb923c;border-color:#9a3412;}
.bi-empty{color:var(--border);text-align:center;padding:60px;font-size:13px;}

/* ── Sidebar ── */
.sb-hd{padding:16px 18px 10px;border-bottom:1px solid var(--border);}
.sb-title{font-family:'Bebas Neue';font-size:17px;letter-spacing:2px;}
.sb-sub{font-size:10px;color:var(--muted);font-family:monospace;margin-top:3px;}
.event-feed{flex:1;overflow-y:auto;padding:10px;}
.event-item{display:flex;gap:8px;padding:9px 11px;margin-bottom:7px;
  background:var(--card);border-radius:9px;border-left:2px solid var(--border);animation:sli .3s ease;}
@keyframes sli{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
.event-item.guest_in   {border-left-color:var(--cyan);}
.event-item.guest_out  {border-left-color:var(--amber);}
.event-item.cleaning   {border-left-color:var(--green);}
.event-item.maintenance{border-left-color:var(--orange);}
.event-item.complete   {border-left-color:var(--violet);}
.event-txt{font-size:11px;color:var(--text);line-height:1.45;}
.event-time{font-size:9px;color:var(--muted);font-family:monospace;margin-top:2px;}
.sb-footer{padding:10px 14px;border-top:1px solid var(--border);}

/* ── WhatsApp toast ── */
.toast{position:fixed;bottom:22px;right:22px;z-index:9999;background:var(--card);
  border:1px solid rgba(37,211,102,.3);border-radius:14px;padding:16px 20px;max-width:320px;
  box-shadow:0 20px 50px rgba(0,0,0,.7);animation:tIn .45s cubic-bezier(.16,1,.3,1);}
@keyframes tIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast-icon{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#25d366,#128c7e);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.toast-body{background:var(--subtle);border-radius:9px;padding:10px 12px;
  font-size:11px;color:#d1fae5;line-height:1.55;border-left:3px solid #25d366;margin-top:10px;}
.toast-bar{position:absolute;bottom:0;left:0;height:3px;background:linear-gradient(90deg,#25d366,#128c7e);
  border-radius:0 0 14px 14px;animation:shrink 7s linear forwards;}
@keyframes shrink{from{width:100%}to{width:0}}

/* ── Staff tab ── */
.staff-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.staff-sec{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;}
.staff-sec-title{font-family:'Bebas Neue';font-size:20px;letter-spacing:2px;margin-bottom:14px;}
.staff-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.staff-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-weight:700;font-size:11px;color:#fff;flex-shrink:0;}
.staff-name{font-size:12px;font-weight:600;}
.staff-id{font-size:10px;color:var(--muted);font-family:monospace;}
.savings-box{margin-top:18px;background:var(--subtle);border:1px solid rgba(245,158,11,.2);
  border-radius:10px;padding:14px;}
.savings-lbl{font-size:10px;color:var(--amber);font-family:monospace;letter-spacing:1px;margin-bottom:6px;}
.savings-big{font-family:'Bebas Neue';font-size:32px;color:#fbbf24;line-height:1;}
.savings-sub{font-size:10px;color:var(--muted);font-family:monospace;margin-top:3px;}

/* ── Report modal ── */
.modal-overlay{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.8);
  backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;
  padding:28px;width:90%;max-width:480px;animation:mIn .35s cubic-bezier(.16,1,.3,1);}
@keyframes mIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-title{font-family:'Bebas Neue';font-size:24px;letter-spacing:2px;margin-bottom:18px;}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body class="z1">
<header>
  <div class="logo">
    <div class="logo-icon">🏨</div>
    <div>
      <div class="logo-name">SMARTSTAY</div>
      <div class="logo-sub">HA YELLOW · TOKEN SYSTEM · LIVE</div>
    </div>
  </div>
  <div class="conn-badge"><div class="cdot" id="cd"></div><span id="cl">Conectando…</span></div>
  <div class="hstats" id="hstats"></div>
  <div style="display:flex;align-items:center;gap:5px;margin-left:8px;">
    <div class="live-dot"></div>
    <span style="font-size:10px;color:var(--muted);font-family:monospace;">EN VIVO</span>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="setTab('dashboard',this)">Dashboard</button>
  <button class="tab" onclick="setTab('bi',this)">Reportes BI</button>
  <button class="tab" onclick="setTab('staff',this)">Personal</button>
</div>

<div class="main">
  <div class="content" id="content"></div>
  <div class="sidebar">
    <div class="sb-hd">
      <div class="sb-title">EVENTOS EN VIVO</div>
      <div class="sb-sub" id="evCount">0 eventos</div>
    </div>
    <div class="event-feed" id="evFeed"><div style="color:var(--border);text-align:center;padding:40px;font-family:monospace;font-size:11px;">Esperando eventos…</div></div>
    <div class="sb-footer">
      <div style="font-size:9px;color:var(--muted);font-family:monospace;letter-spacing:1px;">WHATSAPP: <span id="waCount" style="color:var(--green)">0</span></div>
      <div id="waLog" style="max-height:90px;overflow-y:auto;margin-top:6px;"></div>
    </div>
  </div>
</div>

<div id="toastBox"></div>
<div id="modalBox"></div>

<script>
const KWH_PRICE=9.53, HVAC_KWH=1.5, LIGHTS_KWH=0.15, TOTAL_KWH=HVAC_KWH+LIGHTS_KWH;
const BLOCK_COLORS={A:'var(--cyan)',B:'var(--violet)',C:'var(--amber)',D:'var(--green)'};
const BLOCK_NAMES={A:'Ala Norte',B:'Ala Sur',C:'Ala Este',D:'Ala Oeste'};
const STATUS_LABEL={occupied:'Ocupada',empty:'Disponible',cleaning:'Limpieza',maintenance:'Mantenimiento'};

let state={rooms:[],events:[],biLogs:[],whatsappLog:[],staff:[],energy:{kwh:0,dop:0}};
let currentTab='dashboard', activeBlock=null;
let biFilters={type:'all',block:'all',staff:'all',date:'all'};
let ws, lastWaLen=0;

// ── WebSocket ──────────────────────────────────────────────
function connect(){
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}`);
  ws.onopen=()=>{document.getElementById('cd').classList.add('on');document.getElementById('cl').textContent='Conectado';};
  ws.onmessage=e=>{
    const {type,payload}=JSON.parse(e.data);
    if(type==='STATE'){
      const prev=lastWaLen;
      state=payload; lastWaLen=state.whatsappLog?.length||0;
      render();
      if(state.whatsappLog?.length>prev) showToast(state.whatsappLog[0]);
    }
  };
  ws.onclose=()=>{document.getElementById('cd').classList.remove('on');document.getElementById('cl').textContent='Reconectando…';setTimeout(connect,2500);};
}
connect();

// Refresh energy every 30s
setInterval(()=>{ if(currentTab==='dashboard') renderEnergyBanner(); },30000);

function setTab(t,el){
  currentTab=t; activeBlock=null;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  el.classList.add('active'); render();
}

// ── Render router ──────────────────────────────────────────
function render(){
  renderStats();
  renderSidebar();
  if(currentTab==='dashboard') renderDashboard();
  else if(currentTab==='bi')   renderBI();
  else if(currentTab==='staff') renderStaff();
}

function renderStats(){
  const r=state.rooms||[];
  const e=state.energy||{kwh:0,dop:0};
  const pills=[

        <div class="block-header">
          <div>
            <div class="block-letter" style="color:${BLOCK_COLORS[b]}">${b}</div>

          <option value="all" ${biFilters.date==='all'?'selected':''}>Todas</option>

      <table>

          <tr>

function setBiFilter(key,val){
  biFilters[key]=val; renderBI();
}

function getFilteredLogs(){
  let logs=state.biLogs||[];
  if(biFilters.type!=='all') logs=logs.filter(l=>l.type===biFilters.type);
  if(biFilters.block!=='all') logs=logs.filter(l=>l.block===biFilters.block);
  if(biFilters.staff!=='all') logs=logs.filter(l=>l.staff===biFilters.staff);
  if(biFilters.date!=='all') logs=logs.filter(l=>l.date===biFilters.date);
  return logs;
}

function exportCSV(){
  const logs=getFilteredLogs();
  const rows=['Habitacion,Ala,Personal,Tipo,Inicio,Fin,Duracion,Fecha'];
  logs.forEach(l=>rows.push(`${l.room},${l.block},${l.staff},${l.type},"${l.start}","${l.end||'En curso'}",${l.duration||'-'},${l.date||''}`));
  const blob=new Blob([rows.join('\n')],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`smartstay_bi_${new Date().toISOString().slice(0,10)}.csv`; a.click();
}

function exportXLS(){
  const logs=getFilteredLogs();
  let xml=`<?xml version="1.0"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"
    xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">
  <Worksheet ss:Name="SmartStay BI"><Table>
  <Row><Cell><Data ss:Type="String">Habitacion</Data></Cell><Cell><Data ss:Type="String">Ala</Data></Cell>
  <Cell><Data ss:Type="String">Personal</Data></Cell><Cell><Data ss:Type="String">Tipo</Data></Cell>
  <Cell><Data ss:Type="String">Inicio</Data></Cell><Cell><Data ss:Type="String">Fin</Data></Cell>
  <Cell><Data ss:Type="String">Duracion</Data></Cell><Cell><Data ss:Type="String">Fecha</Data></Cell></Row>`;
  logs.forEach(l=>{
    xml+=`<Row><Cell><Data ss:Type="String">${l.room}</Data></Cell><Cell><Data ss:Type="String">${l.block}</Data></Cell>
    <Cell><Data ss:Type="String">${l.staff}</Data></Cell><Cell><Data ss:Type="String">${l.type}</Data></Cell>
    <Cell><Data ss:Type="String">${l.start}</Data></Cell><Cell><Data ss:Type="String">${l.end||'En curso'}</Data></Cell>
    <Cell><Data ss:Type="String">${l.duration||'-'}</Data></Cell><Cell><Data ss:Type="String">${l.date||''}</Data></Cell></Row>`;
  });
  xml+=`</Table></Worksheet></Workbook>`;
  const blob=new Blob([xml],{type:'application/vnd.ms-excel'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`smartstay_bi_${new Date().toISOString().slice(0,10)}.xls`; a.click();
}

      <div class="toast-bar"></div>
    </div>`;
  setTimeout(()=>document.getElementById(id)?.remove(),7000);
}
</script>
</body>
