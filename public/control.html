<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>SmartStay — Control</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:      #03060d;
    --surface: #080d18;
    --card:    #0c1220;
    --border:  #0f1a30;
    --cyan:    #00d4c8;
    --green:   #22c55e;
    --amber:   #f59e0b;
    --orange:  #f97316;
    --red:     #ef4444;
    --blue:    #3b82f6;
    --text:    #e8edf5;
    --muted:   #4a5568;
    --subtle:  #111d35;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'DM Sans',sans-serif;
    min-height:100vh; max-width:480px; margin:0 auto;
    padding-bottom:100px;
  }

  /* ── Header ── */
  .ctrl-header {
    background:rgba(8,13,24,0.97);
    backdrop-filter:blur(20px);
    padding:16px 20px 12px;
    position:sticky; top:0; z-index:100;
    border-bottom:1px solid var(--border);
  }
  .ctrl-title { display:flex; align-items:center; gap:10px; }
  .ctrl-icon {
    width:38px; height:38px; border-radius:10px;
    background:linear-gradient(135deg,#dc2626,#f97316);
    display:flex; align-items:center; justify-content:center;
    font-size:18px; flex-shrink:0;
  }
  .ctrl-name { font-family:'Bebas Neue'; font-size:22px; letter-spacing:2px; line-height:1; }
  .ctrl-sub  { font-size:10px; color:var(--muted); letter-spacing:1.5px; font-family:monospace; }
  .ctrl-conn {
    display:flex; align-items:center; gap:5px;
    font-size:10px; color:var(--muted); font-family:monospace;
    margin-top:8px;
  }
  .conn-dot { width:6px; height:6px; border-radius:50%; background:var(--red); transition:background .3s; }
  .conn-dot.online { background:var(--green); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  /* ── Stats row ── */
  .stats-row {
    display:flex; gap:8px; padding:14px 16px; overflow-x:auto;
    scrollbar-width:none;
  }
  .stats-row::-webkit-scrollbar { display:none; }
  .mini-stat {
    flex-shrink:0; background:var(--card); border:1px solid var(--border);
    border-radius:12px; padding:10px 14px; text-align:center; min-width:70px;
  }
  .mini-stat .val { font-family:'Bebas Neue'; font-size:22px; line-height:1; }
  .mini-stat .lbl { font-size:9px; color:var(--muted); font-family:monospace; letter-spacing:.5px; margin-top:2px; }

  /* ── Section title ── */
  .sec-title {
    padding:16px 16px 8px;
    font-family:'Bebas Neue'; font-size:16px; letter-spacing:2px;
    color:var(--muted);
  }

  /* ── Room cards (compact mobile) ── */
  .rooms-list { padding:0 12px; display:flex; flex-direction:column; gap:10px; }
  .room-ctrl {
    background:var(--card); border:1px solid var(--border);
    border-radius:14px; padding:14px 16px;
    border-left:3px solid var(--border);
    transition:border-color .3s;
  }
  .room-ctrl.occupied    { border-left-color:var(--cyan); }
  .room-ctrl.empty       { border-left-color:var(--muted); }
  .room-ctrl.cleaning    { border-left-color:var(--green); }
  .room-ctrl.maintenance { border-left-color:var(--orange); }

  .room-ctrl-top {
    display:flex; justify-content:space-between;
    align-items:center; margin-bottom:10px;
  }
  .room-ctrl-num { font-family:'Bebas Neue'; font-size:22px; color:#fff; }
  .room-ctrl-guest { font-size:12px; font-weight:600; }
  .room-ctrl-token { font-size:10px; color:var(--muted); font-family:monospace; }

  .room-systems-row {
    display:flex; gap:8px; margin-bottom:10px;
  }
  .sys-pill {
    flex:1; background:var(--subtle); border-radius:8px;
    padding:6px 10px; text-align:center;
    font-size:11px; font-weight:600;
    transition:all .3s;
  }
  .sys-pill.on   { color:var(--cyan); }
  .sys-pill.idle { color:var(--amber); }
  .sys-pill.off  { color:var(--muted); }

  .room-actions { display:flex; gap:8px; flex-wrap:wrap; }
  .btn {
    flex:1; min-width:100px; padding:10px 8px; border:none; border-radius:10px;
    font-family:'DM Sans'; font-size:12px; font-weight:600;
    cursor:pointer; transition:all .15s; text-align:center;
    -webkit-tap-highlight-color:transparent;
  }
  .btn:active { transform:scale(.96); }
  .btn-guest-out { background:#1e3a5f; color:var(--blue); }
  .btn-guest-in  { background:#14532d22; color:var(--green); border:1px solid var(--green)44; }
  .btn-staff     { background:var(--subtle); color:var(--text); }
  .btn-done      { background:#4c1d1d; color:#f87171; }
  .btn-danger    { background:#4c1d1d; color:#f87171; }

  /* ── Staff picker modal ── */
  .modal-overlay {
    position:fixed; inset:0; z-index:999;
    background:rgba(0,0,0,.85); backdrop-filter:blur(6px);
    display:flex; align-items:flex-end; justify-content:center;
  }
  .modal {
    background:var(--surface); border:1px solid var(--border);
    border-radius:20px 20px 0 0; padding:20px 20px 40px;
    width:100%; max-width:480px;
    animation:slideUp .35s cubic-bezier(.16,1,.3,1);
  }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-title {
    font-family:'Bebas Neue'; font-size:20px; letter-spacing:2px;
    margin-bottom:16px; display:flex; justify-content:space-between;
    align-items:center;
  }
  .modal-close {
    background:none; border:none; color:var(--muted);
    font-size:24px; cursor:pointer; line-height:1;
  }
  .staff-picker-item {
    display:flex; align-items:center; gap:14px;
    padding:14px; border-radius:12px;
    margin-bottom:8px; cursor:pointer; transition:background .15s;
    background:var(--card); border:1px solid var(--border);
  }
  .staff-picker-item:active { background:var(--subtle); }
  .staff-picker-item.busy   { opacity:.4; cursor:not-allowed; }
  .picker-avatar {
    width:44px; height:44px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:13px; color:#fff; flex-shrink:0;
  }
  .picker-name { font-size:14px; font-weight:600; }
  .picker-role { font-size:11px; color:var(--muted); font-family:monospace; }
  .picker-status {
    margin-left:auto; font-size:11px; font-family:monospace;
    padding:3px 10px; border-radius:20px; border:1px solid;
  }
  .picker-status.free { color:var(--green); border-color:var(--green)44; background:rgba(34,197,94,.08); }
  .picker-status.busy { color:var(--muted); border-color:var(--muted)44; }

  /* ── Reset btn ── */
  .reset-btn {
    display:block; margin:20px auto 0;
    padding:12px 28px; border-radius:12px;
    border:1px solid var(--red)44; background:rgba(239,68,68,.08);
    color:var(--red); font-family:'DM Sans'; font-size:13px;
    font-weight:600; cursor:pointer;
  }

  /* ── Active staff badge ── */
  .active-badge {
    border-radius:8px; padding:8px 10px; margin-bottom:10px;
    font-size:12px;
  }
  .active-badge.cleaning    { background:rgba(34,197,94,.08);  color:var(--green);  border:1px solid rgba(34,197,94,.2); }
  .active-badge.maintenance { background:rgba(249,115,22,.08); color:var(--orange); border:1px solid rgba(249,115,22,.2); }

  ::-webkit-scrollbar { width:3px; }
  ::-webkit-scrollbar-thumb { background:var(--border); }
</style>
</head>
<body>

<div class="ctrl-header">
  <div class="ctrl-title">
    <div class="ctrl-icon">🎛️</div>
    <div>
      <div class="ctrl-name">PANEL DE CONTROL</div>
      <div class="ctrl-sub">SMARTSTAY · SOLO OPERADOR</div>
    </div>
  </div>
  <div class="ctrl-conn">
    <div class="conn-dot" id="connDot"></div>
    <span id="connLabel">Conectando…</span>
  </div>
</div>

<div class="stats-row" id="statsRow"></div>

<div class="sec-title">HABITACIONES</div>
<div class="rooms-list" id="roomsList"></div>

<button class="reset-btn" onclick="sendAction('RESET',{})">🔄 Reiniciar Demo</button>

<!-- Staff picker modal -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <div class="modal-title">
      <span id="modalTitle">ASIGNAR PERSONAL</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

<script>
let state = { rooms:[], events:[], biLogs:[], whatsappLog:[], staff:[] };
let ws;
let pendingRoomId = null;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen = () => {
    document.getElementById('connDot').classList.add('online');
    document.getElementById('connLabel').textContent = 'Conectado';
  };
  ws.onmessage = e => {
    const { type, payload } = JSON.parse(e.data);
    if (type === 'STATE') { state = payload; render(); }
  };
  ws.onclose = () => {
    document.getElementById('connDot').classList.remove('online');
    document.getElementById('connLabel').textContent = 'Reconectando…';
    setTimeout(connect, 2500);
  };
}
connect();

function sendAction(action, payload) {
  if (ws && ws.readyState === 1)
    ws.send(JSON.stringify({ action, payload }));
}

function render() {
  renderStats();
  renderRooms();
}

function renderStats() {
  const rooms = state.rooms || [];
  const s = [
    { val: rooms.filter(r=>r.status==='occupied').length,    lbl:'Ocup.', color:'var(--cyan)' },
    { val: rooms.filter(r=>r.status==='empty').length,       lbl:'Libre', color:'var(--muted)' },
    { val: rooms.filter(r=>r.status==='cleaning').length,    lbl:'Limp.', color:'var(--green)' },
    { val: rooms.filter(r=>r.status==='maintenance').length, lbl:'Mant.', color:'var(--orange)' },
    { val: rooms.filter(r=>r.hvacMode==='idle').length,      lbl:'Idle',  color:'var(--amber)' },
  ];
  document.getElementById('statsRow').innerHTML = s.map(x => `
    <div class="mini-stat">
      <div class="val" style="color:${x.color}">${x.val}</div>
      <div class="lbl">${x.lbl}</div>
    </div>
  `).join('');
}

function renderRooms() {
  const rooms = state.rooms || [];
  document.getElementById('roomsList').innerHTML = rooms.map(r => {
    const hvacOn = r.hvacMode === 'comfort';
    return `
    <div class="room-ctrl ${r.status}">
      <div class="room-ctrl-top">
        <div>
          <div class="room-ctrl-num">Hab. ${r.number} · Piso ${r.floor}</div>
          <div class="room-ctrl-guest">${r.guest.name}</div>
          <div class="room-ctrl-token">${r.tokenId} · ${r.guest.phone}</div>
        </div>
      </div>

      <div class="room-systems-row">
        <div class="sys-pill ${hvacOn?'on':'idle'}">
          ${hvacOn?'❄️ Comfort':'😴 Idle'}
        </div>
        <div class="sys-pill ${r.lightsOn?'on':'off'}">
          ${r.lightsOn?'💡 Luces ON':'🌑 Luces OFF'}
        </div>
        <div class="sys-pill ${r.guestPresent?'on':'off'}">
          ${r.guestPresent?'● Presente':'○ Ausente'}
        </div>
      </div>

      ${r.activeStaff ? `
      <div class="active-badge ${r.activeStaff.role}">
        ${r.activeStaff.role==='cleaning'?'🧹':'🔧'} ${r.activeStaff.name} en curso…
      </div>
      ` : ''}

      <div class="room-actions">
        <button class="btn ${r.guestPresent?'btn-guest-out':'btn-guest-in'}"
          onclick="sendAction('TOGGLE_GUEST',{roomId:${r.id}})">
          ${r.guestPresent ? '🚶 Sale huésped' : '🔑 Entra huésped'}
        </button>
        ${r.activeStaff
          ? `<button class="btn btn-done" onclick="sendAction('REMOVE_STAFF',{roomId:${r.id}})">✅ Completado</button>`
          : `<button class="btn btn-staff" onclick="openStaffPicker(${r.id})">👤 Enviar personal</button>`
        }
      </div>
    </div>
    `;
  }).join('');
}

// ── Staff picker ───────────────────────────────────────────
function openStaffPicker(roomId) {
  pendingRoomId = roomId;
  const staff = state.staff || [];
  const busyIds = (state.rooms||[]).filter(r=>r.activeStaff).map(r=>r.activeStaff.id);
  const room = (state.rooms||[]).find(r=>r.id===roomId);

  document.getElementById('modalTitle').textContent = `PERSONAL → HAB. ${room?.number||''}`;
  document.getElementById('modalContent').innerHTML = staff.map(s => {
    const busy = busyIds.includes(s.id);
    const color = s.role==='cleaning' ? '#166534' : '#9a3412';
    const textColor = s.role==='cleaning' ? 'var(--green)' : 'var(--orange)';
    return `
    <div class="staff-picker-item ${busy?'busy':''}"
      onclick="${busy?'':'assignStaff(\''+s.id+'\')'}">
      <div class="picker-avatar" style="background:${busy?'var(--muted)':color}">${s.avatar}</div>
      <div>
        <div class="picker-name">${s.name}</div>
        <div class="picker-role">${s.role==='cleaning'?'🧹 Limpieza':'🔧 Mantenimiento'} · ${s.id}</div>
      </div>
      <span class="picker-status ${busy?'busy':'free'}">${busy?'Ocupado':'Libre'}</span>
    </div>
    `;
  }).join('');

  document.getElementById('modalOverlay').style.display = 'flex';
}

function assignStaff(staffId) {
  if (!pendingRoomId) return;
  sendAction('SEND_STAFF', { roomId: pendingRoomId, staffId });
  closeModal();
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').style.display = 'none';
  pendingRoomId = null;
}
</script>
</body>
</html>
