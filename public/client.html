<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SmartStay — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #05080f;
    --surface:  #0a0f1c;
    --card:     #0d1525;
    --border:   #111d35;
    --cyan:     #00d4c8;
    --green:    #22c55e;
    --amber:    #f59e0b;
    --orange:   #f97316;
    --blue:     #3b82f6;
    --red:      #ef4444;
    --text:     #e8edf5;
    --muted:    #4a5568;
    --subtle:   #1a2540;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Animated grid background ── */
  body::before {
    content:'';
    position:fixed; inset:0; z-index:0;
    background-image:
      linear-gradient(rgba(0,212,200,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,200,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events:none;
  }

  .wrap { position:relative; z-index:1; }

  /* ── Header ── */
  header {
    background: rgba(10,15,28,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 68px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky; top:0; z-index:100;
  }
  .logo-block { display:flex; align-items:center; gap:12px; }
  .logo-icon {
    width:44px; height:44px; border-radius:12px;
    background: linear-gradient(135deg, #0ea5e9, #00d4c8);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; box-shadow: 0 0 20px rgba(0,212,200,0.3);
  }
  .logo-text { line-height:1; }
  .logo-name {
    font-family:'Bebas Neue'; font-size:26px; letter-spacing:3px;
    color:#fff;
  }
  .logo-sub { font-size:10px; color:var(--muted); letter-spacing:2px; font-family:monospace; }

  .header-stats { display:flex; gap:10px; margin-left:auto; }
  .stat-pill {
    display:flex; align-items:center; gap:7px;
    padding: 6px 14px; border-radius:24px;
    background: var(--subtle); border:1px solid var(--border);
  }
  .stat-pill .val { font-weight:700; font-size:15px; }
  .stat-pill .lbl { font-size:11px; color:var(--muted); letter-spacing:.5px; }

  .live-dot {
    width:8px; height:8px; border-radius:50%;
    background: var(--green);
    animation: pulse 2s ease-in-out infinite;
    box-shadow: 0 0 8px var(--green);
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

  /* ── Tabs ── */
  .tabs {
    display:flex; gap:4px; padding:20px 28px 0;
    border-bottom:1px solid var(--border);
    background:var(--surface);
  }
  .tab {
    padding:10px 22px; border:none; background:transparent;
    color:var(--muted); font-family:'DM Sans'; font-size:13px;
    font-weight:500; cursor:pointer; border-bottom:2px solid transparent;
    transition:all .2s; letter-spacing:.3px;
  }
  .tab.active { color:var(--cyan); border-bottom-color:var(--cyan); }

  /* ── Main Layout ── */
  .main { display:flex; height:calc(100vh - 68px - 45px); }
  .content { flex:1; overflow-y:auto; padding:24px 28px; }
  .sidebar {
    width:320px; border-left:1px solid var(--border);
    background:var(--surface);
    display:flex; flex-direction:column;
    overflow:hidden;
  }

  /* ── Occupancy bar ── */
  .occ-bar-wrap {
    background:var(--card); border:1px solid var(--border);
    border-radius:14px; padding:16px 20px; margin-bottom:22px;
    display:flex; align-items:center; gap:16px;
  }
  .occ-bar-label { font-family:monospace; font-size:11px; color:var(--muted); white-space:nowrap; letter-spacing:1px; }
  .occ-bar { flex:1; height:10px; background:var(--subtle); border-radius:5px; overflow:hidden; display:flex; }
  .occ-seg { height:100%; transition:width .6s cubic-bezier(.34,1.56,.64,1); }
  .occ-pct { font-weight:700; font-size:20px; font-family:'Bebas Neue'; letter-spacing:1px; color:var(--cyan); }
  .occ-count { font-size:11px; color:var(--muted); font-family:monospace; }

  /* ── Room grid ── */
  .room-grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(230px,1fr));
    gap:16px;
  }

  /* ── Room card ── */
  .room-card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:18px;
    position:relative;
    overflow:hidden;
    transition:border-color .3s, box-shadow .3s;
  }
  .room-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background: var(--accent-color, var(--border));
    transition: background .4s;
  }
  .room-card.status-occupied  { --accent-color: var(--cyan);   border-color: rgba(0,212,200,.2); }
  .room-card.status-empty     { --accent-color: var(--muted);  }
  .room-card.status-cleaning  { --accent-color: var(--green);  border-color: rgba(34,197,94,.2); box-shadow:0 0 20px rgba(34,197,94,.06); }
  .room-card.status-maintenance{ --accent-color: var(--orange); border-color: rgba(249,115,22,.2); box-shadow:0 0 20px rgba(249,115,22,.06); }

  .room-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
  .room-num { font-family:'Bebas Neue'; font-size:32px; color:#fff; line-height:1; letter-spacing:1px; }
  .room-floor { font-size:10px; color:var(--muted); font-family:monospace; letter-spacing:1px; }
  .room-badge {
    padding:3px 10px; border-radius:20px; font-size:10px;
    font-family:monospace; letter-spacing:1px; border:1px solid;
    transition:all .3s;
  }
  .badge-occupied   { background:rgba(0,212,200,.1);  color:var(--cyan);   border-color:rgba(0,212,200,.3); }
  .badge-empty      { background:rgba(74,85,104,.1);  color:var(--muted);  border-color:rgba(74,85,104,.3); }
  .badge-cleaning   { background:rgba(34,197,94,.1);  color:var(--green);  border-color:rgba(34,197,94,.3); }
  .badge-maintenance{ background:rgba(249,115,22,.1); color:var(--orange); border-color:rgba(249,115,22,.3); }

  .room-guest {
    background:var(--subtle); border-radius:10px; padding:10px 12px; margin-bottom:10px;
  }
  .room-guest-label { font-size:10px; color:var(--muted); font-family:monospace; letter-spacing:1px; margin-bottom:4px; }
  .room-guest-name  { font-size:13px; font-weight:600; color:var(--text); }
  .room-guest-phone { font-size:11px; color:var(--muted); font-family:monospace; }

  .room-systems {
    display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px;
  }
  .sys-block {
    background:var(--subtle); border-radius:9px; padding:8px 10px;
  }
  .sys-label { font-size:9px; color:var(--muted); font-family:monospace; letter-spacing:1px; margin-bottom:3px; }
  .sys-val { font-size:13px; font-weight:700; }
  .sys-val.on  { color:var(--cyan); }
  .sys-val.idle{ color:var(--amber); }
  .sys-val.off { color:var(--muted); }

  .staff-active {
    border-radius:10px; padding:9px 12px;
    margin-bottom:4px;
    animation: fadeInUp .4s ease;
  }
  .staff-active.cleaning    { background:rgba(34,197,94,.08);  border:1px solid rgba(34,197,94,.2); }
  .staff-active.maintenance { background:rgba(249,115,22,.08); border:1px solid rgba(249,115,22,.2); }
  .staff-role-label { font-size:10px; font-family:monospace; letter-spacing:1px; font-weight:700; }
  .staff-active.cleaning    .staff-role-label { color:var(--green); }
  .staff-active.maintenance .staff-role-label { color:var(--orange); }
  .staff-name { font-size:12px; font-weight:600; color:var(--text); margin-top:2px; }

  @keyframes fadeInUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  /* ── Sidebar event feed ── */
  .sidebar-header {
    padding:18px 20px 12px;
    border-bottom:1px solid var(--border);
  }
  .sidebar-title { font-family:'Bebas Neue'; font-size:18px; letter-spacing:2px; }
  .sidebar-sub { font-size:11px; color:var(--muted); font-family:monospace; margin-top:4px; }

  .event-feed { flex:1; overflow-y:auto; padding:12px; }
  .event-item {
    display:flex; gap:10px; padding:10px 12px; margin-bottom:8px;
    background:var(--card); border-radius:10px;
    border-left:2px solid var(--border);
    animation:slideIn .3s ease;
  }
  @keyframes slideIn { from{opacity:0;transform:translateX(12px)} to{opacity:1;transform:translateX(0)} }
  .event-item.guest_in    { border-left-color:var(--cyan); }
  .event-item.guest_out   { border-left-color:var(--amber); }
  .event-item.cleaning    { border-left-color:var(--green); }
  .event-item.maintenance { border-left-color:var(--orange); }
  .event-item.complete    { border-left-color:#a78bfa; }
  .event-text { font-size:12px; color:var(--text); line-height:1.5; }
  .event-time { font-size:10px; color:var(--muted); font-family:monospace; margin-top:3px; }

  /* ── WhatsApp notification toast ── */
  .toast {
    position:fixed; bottom:24px; right:24px; z-index:9999;
    background:var(--card); border:1px solid rgba(37,211,102,.3);
    border-radius:16px; padding:18px 22px; max-width:340px;
    box-shadow: 0 20px 60px rgba(0,0,0,.7);
    animation: toastIn .5s cubic-bezier(.16,1,.3,1);
  }
  @keyframes toastIn { from{transform:translateX(120%);opacity:0} to{transform:translateX(0);opacity:1} }
  .toast-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .toast-icon {
    width:38px; height:38px; border-radius:50%;
    background:linear-gradient(135deg,#25d366,#128c7e);
    display:flex; align-items:center; justify-content:center; font-size:20px;
  }
  .toast-to   { font-size:13px; font-weight:700; color:var(--text); }
  .toast-meta { font-size:11px; color:var(--muted); font-family:monospace; }
  .toast-body {
    background:var(--subtle); border-radius:10px; padding:12px;
    font-size:12px; color:#d1fae5; line-height:1.6;
    border-left:3px solid #25d366;
  }
  .toast-close {
    position:absolute; top:12px; right:14px;
    background:none; border:none; color:var(--muted);
    cursor:pointer; font-size:18px; line-height:1;
  }
  .toast-bar {
    position:absolute; bottom:0; left:0; height:3px;
    background:linear-gradient(90deg,#25d366,#128c7e);
    border-radius:0 0 16px 16px;
    animation:shrink 7s linear forwards;
  }
  @keyframes shrink { from{width:100%} to{width:0} }

  /* ── BI Table ── */
  .bi-wrap { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:24px; }
  .bi-title { font-family:'Bebas Neue'; font-size:26px; letter-spacing:2px; margin-bottom:4px; }
  .bi-sub   { font-size:12px; color:var(--muted); font-family:monospace; margin-bottom:20px; }
  .bi-filters { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  .bi-filter {
    padding:5px 16px; border-radius:20px; border:1px solid var(--border);
    background:transparent; color:var(--muted); cursor:pointer;
    font-size:11px; font-family:monospace; letter-spacing:1px; text-transform:uppercase;
    transition:all .2s;
  }
  .bi-filter.active { background:#1e3a5f; border-color:var(--blue); color:var(--blue); }
  table { width:100%; border-collapse:collapse; font-family:monospace; font-size:12px; }
  th { padding:8px 12px; color:var(--muted); text-align:left; font-weight:600; border-bottom:1px solid var(--border); }
  td { padding:10px 12px; border-bottom:1px solid rgba(17,29,53,.8); }
  tr:hover td { background:rgba(255,255,255,.01); }
  .type-badge {
    padding:2px 10px; border-radius:20px; font-size:11px; border:1px solid;
  }
  .type-cleaning    { background:#052e16; color:#4ade80; border-color:#166534; }
  .type-maintenance { background:#1c1917; color:#fb923c; border-color:#9a3412; }
  .bi-empty { color:var(--border); text-align:center; padding:60px; font-family:monospace; font-size:14px; }

  /* ── Staff tab ── */
  .staff-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  .staff-section { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:22px; }
  .staff-sec-title { font-family:'Bebas Neue'; font-size:22px; letter-spacing:2px; margin-bottom:16px; }
  .staff-row {
    display:flex; align-items:center; gap:12px;
    padding:12px 0; border-bottom:1px solid var(--border);
  }
  .staff-avatar {
    width:40px; height:40px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:12px; color:#fff; flex-shrink:0;
  }
  .staff-info { flex:1; }
  .staff-info-name { font-size:13px; font-weight:600; }
  .staff-info-id   { font-size:11px; color:var(--muted); font-family:monospace; }
  .staff-status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

  .savings-card {
    margin-top:20px; background:var(--subtle); border:1px solid rgba(245,158,11,.2);
    border-radius:12px; padding:16px;
  }
  .savings-label { font-size:11px; color:var(--amber); font-family:monospace; letter-spacing:1px; margin-bottom:8px; }
  .savings-val   { font-family:'Bebas Neue'; font-size:36px; color:#fbbf24; line-height:1; }
  .savings-sub   { font-size:11px; color:var(--muted); font-family:monospace; margin-top:4px; }

  /* scrollbar */
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

  .conn-status {
    display:flex; align-items:center; gap:6px;
    font-size:11px; font-family:monospace; color:var(--muted); margin-left:16px;
  }
  .conn-dot { width:7px; height:7px; border-radius:50%; background:var(--red); transition:background .3s; }
  .conn-dot.online { background:var(--green); animation:pulse 2s infinite; }
</style>
</head>
<body>
<div class="wrap">

<!-- HEADER -->
<header>
  <div class="logo-block">
    <div class="logo-icon">🏨</div>
    <div class="logo-text">
      <div class="logo-name">SMARTSTAY</div>
      <div class="logo-sub">HA YELLOW · TOKEN SYSTEM · LIVE</div>
    </div>
  </div>
  <div class="conn-status">
    <div class="conn-dot" id="connDot"></div>
    <span id="connLabel">Conectando…</span>
  </div>
  <div class="header-stats" id="headerStats"></div>
  <div style="display:flex;align-items:center;gap:6px;margin-left:8px;">
    <div class="live-dot"></div>
    <span style="font-size:11px;color:var(--muted);font-family:monospace;">EN VIVO</span>
  </div>
</header>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="setTab('dashboard',this)">Dashboard</button>
  <button class="tab" onclick="setTab('bi',this)">Reportes BI</button>
  <button class="tab" onclick="setTab('staff',this)">Personal</button>
</div>

<!-- MAIN -->
<div class="main">
  <div class="content" id="content"></div>
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">EVENTOS EN VIVO</div>
      <div class="sidebar-sub" id="eventCount">0 eventos registrados</div>
    </div>
    <div class="event-feed" id="eventFeed">
      <div style="color:var(--border);text-align:center;padding:40px;font-family:monospace;font-size:12px;">
        Esperando eventos…
      </div>
    </div>
    <div style="padding:12px 16px;border-top:1px solid var(--border);">
      <div style="font-size:10px;color:var(--muted);font-family:monospace;letter-spacing:1px;margin-bottom:8px;">
        WHATSAPP ENVIADOS: <span id="waCount" style="color:var(--green)">0</span>
      </div>
      <div id="waLog" style="max-height:100px;overflow-y:auto;"></div>
    </div>
  </div>
</div>

</div>

<!-- TOAST container -->
<div id="toastContainer"></div>

<script>
let state = { rooms:[], events:[], biLogs:[], whatsappLog:[], staff:[] };
let currentTab = 'dashboard';
let biFilter = 'all';
let ws;

// ── WebSocket ──────────────────────────────────────────────
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen = () => {
    document.getElementById('connDot').classList.add('online');
    document.getElementById('connLabel').textContent = 'Conectado';
  };
  ws.onmessage = (e) => {
    const { type, payload } = JSON.parse(e.data);
    if (type === 'STATE') {
      const prevWaLen = state.whatsappLog?.length || 0;
      state = payload;
      render();
      // Show toast if new WhatsApp
      if (state.whatsappLog.length > prevWaLen) {
        showToast(state.whatsappLog[0]);
      }
    }
  };
  ws.onclose = () => {
    document.getElementById('connDot').classList.remove('online');
    document.getElementById('connLabel').textContent = 'Reconectando…';
    setTimeout(connect, 2500);
  };
}
connect();

// ── Tabs ──────────────────────────────────────────────────
function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ── Render ────────────────────────────────────────────────
function render() {
  renderStats();
  renderSidebar();
  if      (currentTab === 'dashboard') renderDashboard();
  else if (currentTab === 'bi')        renderBI();
  else if (currentTab === 'staff')     renderStaff();
}

function renderStats() {
  const rooms = state.rooms || [];
  const occupied    = rooms.filter(r => r.status === 'occupied').length;
  const cleaning    = rooms.filter(r => r.status === 'cleaning').length;
  const maintenance = rooms.filter(r => r.status === 'maintenance').length;
  const hvacIdle    = rooms.filter(r => r.hvacMode === 'idle').length;
  const lightsOff   = rooms.filter(r => !r.lightsOn).length;

  document.getElementById('headerStats').innerHTML = [
    { val: occupied,    lbl: 'Ocupadas', color: 'var(--cyan)' },
    { val: cleaning,    lbl: 'Limpieza', color: 'var(--green)' },
    { val: maintenance, lbl: 'Mant.',    color: 'var(--orange)' },
    { val: hvacIdle,    lbl: 'HVAC Idle',color: 'var(--amber)' },
    { val: lightsOff,   lbl: 'Luces OFF',color: 'var(--muted)' },
  ].map(s => `
    <div class="stat-pill">
      <span class="val" style="color:${s.color}">${s.val}</span>
      <span class="lbl">${s.lbl}</span>
    </div>
  `).join('');
}

function renderDashboard() {
  const rooms = state.rooms || [];
  const occupied    = rooms.filter(r => r.status === 'occupied').length;
  const cleaning    = rooms.filter(r => r.status === 'cleaning').length;
  const maintenance = rooms.filter(r => r.status === 'maintenance').length;
  const empty       = rooms.filter(r => r.status === 'empty').length;
  const total = rooms.length || 10;
  const pct = Math.round(((occupied + cleaning + maintenance) / total) * 100);

  const statusLabel = { occupied:'Ocupada', empty:'Disponible', cleaning:'Limpieza', maintenance:'Mantenimiento' };

  document.getElementById('content').innerHTML = `
    <div class="occ-bar-wrap">
      <span class="occ-bar-label">OCUPACIÓN</span>
      <div class="occ-bar">
        <div class="occ-seg" style="width:${(occupied/total)*100}%;background:var(--cyan)"></div>
        <div class="occ-seg" style="width:${(cleaning/total)*100}%;background:var(--green)"></div>
        <div class="occ-seg" style="width:${(maintenance/total)*100}%;background:var(--orange)"></div>
        <div class="occ-seg" style="width:${(empty/total)*100}%;background:var(--subtle)"></div>
      </div>
      <span class="occ-pct">${pct}%</span>
      <span class="occ-count">${occupied+cleaning+maintenance}/${total} hab.</span>
    </div>

    <div class="room-grid">
      ${rooms.map(r => {
        const hvacOn = r.hvacMode === 'comfort';
        return `
        <div class="room-card status-${r.status}">
          <div class="room-header">
            <div>
              <div style="font-size:10px;color:var(--muted);font-family:monospace;letter-spacing:2px;">HAB.</div>
              <div class="room-num">${r.number}</div>
              <div class="room-floor">Piso ${r.floor}</div>
            </div>
            <div>
              <span class="room-badge badge-${r.status}">${statusLabel[r.status]||r.status}</span>
            </div>
          </div>

          <div class="room-guest">
            <div class="room-guest-label">HUÉSPED</div>
            <div class="room-guest-name">${r.guest.name}</div>
            <div class="room-guest-phone">${r.guest.phone}</div>
          </div>

          <div class="room-systems">
            <div class="sys-block">
              <div class="sys-label">HVAC</div>
              <div class="sys-val ${hvacOn ? 'on' : 'idle'}">
                ${hvacOn ? '❄️ Comfort' : '😴 Idle'}
              </div>
              <div style="font-size:10px;color:var(--muted);font-family:monospace;">${hvacOn ? '72°F' : '78°F'}</div>
            </div>
            <div class="sys-block">
              <div class="sys-label">LUCES</div>
              <div class="sys-val ${r.lightsOn ? 'on' : 'off'}">
                ${r.lightsOn ? '💡 ON' : '🌑 OFF'}
              </div>
              <div style="font-size:10px;color:var(--muted);font-family:monospace;">${r.lightsOn ? 'Activas' : 'Apagadas'}</div>
            </div>
          </div>

          ${r.activeStaff ? `
          <div class="staff-active ${r.activeStaff.role}">
            <div class="staff-role-label">${r.activeStaff.role === 'cleaning' ? '🧹 EN LIMPIEZA' : '🔧 EN MANTENIMIENTO'}</div>
            <div class="staff-name">${r.activeStaff.name}</div>
          </div>
          ` : ''}

          <div style="font-size:9px;color:var(--muted);font-family:monospace;margin-top:8px;">
            Token: ${r.tokenId} · ${r.guestPresent ? '● Presente' : '○ Ausente'}
          </div>
        </div>
        `;
      }).join('')}
    </div>
  `;
}

function renderBI() {
  const logs = (state.biLogs || []).filter(l => biFilter === 'all' || l.type === biFilter);
  document.getElementById('content').innerHTML = `
    <div class="bi-wrap">
      <div class="bi-title">REGISTROS BI</div>
      <div class="bi-sub">Business Intelligence · Limpieza & Mantenimiento · ${state.biLogs?.length||0} registros</div>
      <div class="bi-filters">
        <button class="bi-filter ${biFilter==='all'?'active':''}" onclick="setBiFilter('all',this)">TODOS</button>
        <button class="bi-filter ${biFilter==='cleaning'?'active':''}" onclick="setBiFilter('cleaning',this)">LIMPIEZA</button>
        <button class="bi-filter ${biFilter==='maintenance'?'active':''}" onclick="setBiFilter('maintenance',this)">MANTENIMIENTO</button>
      </div>
      ${logs.length === 0 ? `<div class="bi-empty">Sin registros aún</div>` : `
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>Habitación</th><th>Personal</th><th>Tipo</th>
            <th>Inicio</th><th>Fin</th><th>Duración</th>
          </tr></thead>
          <tbody>
            ${[...logs].reverse().map(l => `
            <tr>
              <td style="color:#fff;font-weight:700">${l.room}</td>
              <td style="color:var(--text)">${l.staff}</td>
              <td><span class="type-badge type-${l.type}">${l.type==='cleaning'?'Limpieza':'Mantenimiento'}</span></td>
              <td style="color:var(--muted)">${l.start}</td>
              <td style="color:var(--muted)">${l.end||'<span style="color:var(--amber)">● En curso</span>'}</td>
              <td style="color:${l.duration?'var(--cyan)':'var(--amber)'}">${l.duration||'…'}</td>
            </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      `}
    </div>
  `;
}

function renderStaff() {
  const staff = state.staff || [];
  const cleaning    = staff.filter(s => s.role === 'cleaning');
  const maintenance = staff.filter(s => s.role === 'maintenance');
  const hvacIdle = (state.rooms||[]).filter(r => r.hvacMode === 'idle').length;

  const staffSection = (title, color, list) => `
    <div class="staff-section">
      <div class="staff-sec-title" style="color:${color}">${title}</div>
      ${list.map(s => {
        const assigned = (state.rooms||[]).find(r => r.activeStaff?.id === s.id);
        return `
        <div class="staff-row">
          <div class="staff-avatar" style="background:${assigned ? color : 'var(--subtle)'}">
            ${s.avatar}
          </div>
          <div class="staff-info">
            <div class="staff-info-name">${s.name}</div>
            <div class="staff-info-id">Token: ${s.id}</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;">
            <div class="staff-status-dot" style="background:${assigned ? color : 'var(--border)'}"></div>
            <span style="font-size:11px;font-family:monospace;color:${assigned ? color : 'var(--muted)'}">
              ${assigned ? `Hab. ${assigned.number}` : 'Libre'}
            </span>
          </div>
        </div>
        `;
      }).join('')}
    </div>
  `;

  document.getElementById('content').innerHTML = `
    <div class="staff-grid">
      ${staffSection('🧹 LIMPIEZA', 'var(--green)', cleaning)}
      <div>
        ${staffSection('🔧 MANTENIMIENTO', 'var(--orange)', maintenance)}
        <div class="savings-card">
          <div class="savings-label">⚡ AHORRO ENERGÉTICO ESTIMADO</div>
          <div class="savings-val">${hvacIdle * 8}%</div>
          <div class="savings-sub">${hvacIdle} hab. con HVAC+Luces OFF · ~8% por hab.</div>
        </div>
      </div>
    </div>
  `;
}

function renderSidebar() {
  const events = state.events || [];
  document.getElementById('eventCount').textContent = `${events.length} eventos registrados`;
  document.getElementById('eventFeed').innerHTML = events.length === 0
    ? `<div style="color:var(--border);text-align:center;padding:40px;font-family:monospace;font-size:12px;">Esperando eventos…</div>`
    : events.map(e => `
      <div class="event-item ${e.type}">
        <div>
          <div class="event-text">${e.text}</div>
          <div class="event-time">${e.time}</div>
        </div>
      </div>
    `).join('');

  const wa = state.whatsappLog || [];
  document.getElementById('waCount').textContent = wa.length;
  document.getElementById('waLog').innerHTML = wa.slice(0,5).map(w => `
    <div style="font-size:10px;color:var(--muted);padding:3px 0;border-bottom:1px solid var(--border);font-family:monospace;">
      📱 ${w.name} · ${w.time.split(' ')[1]||''}
    </div>
  `).join('');
}

function setBiFilter(f, el) {
  biFilter = f;
  document.querySelectorAll('.bi-filter').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderBI();
}

// ── WhatsApp Toast ─────────────────────────────────────────
function showToast(wa) {
  if (!wa) return;
  const id = 'toast_' + Date.now();
  const container = document.getElementById('toastContainer');
  container.innerHTML = `
    <div class="toast" id="${id}">
      <button class="toast-close" onclick="document.getElementById('${id}').remove()">×</button>
      <div class="toast-header">
        <div class="toast-icon">💬</div>
        <div>
          <div class="toast-to">${wa.name}</div>
          <div class="toast-meta">WhatsApp simulado · ${wa.time}</div>
        </div>
      </div>
      <div class="toast-body">${wa.message}</div>
      <div class="toast-bar"></div>
    </div>
  `;
  setTimeout(() => {
    const el = document.getElementById(id);
    if (el) el.remove();
  }, 7000);
}
</script>
</body>
</html>
